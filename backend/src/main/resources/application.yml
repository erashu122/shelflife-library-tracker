spring:
  application:
    name: shelflife-api
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/shelflife}
      auto-index-creation: true

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:replace-with-a-64-character-development-secret-key-for-local-only}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  google-books:
    api-key: ${GOOGLE_BOOKS_API_KEY:}
  google:
    oauth-client-id: ${GOOGLE_OAUTH_CLIENT_ID:179031194859-fmmrk9m69qdmdll8bh85qj32sgjne8cb.apps.googleusercontent.com}
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:5173}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
